[package]
name = "sprawl-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
clap = { version = "4.4", features = ["derive"] }
uuid = { version = "1.8", features = ["v4"] }
sprawl-sentinel = { path = "../sprawl-sentinel" }
sprawl-archaeologist = { version = "0.1.0", path = "../sprawl-archaeologist" }
sprawl-inference = { version = "0.1.0", path = "../sprawl-inference" }
sprawl-core = { version = "0.1.0", path = "../sprawl-core" }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
